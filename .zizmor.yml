---
rules:
  forbidden-uses:
    config:
      allow:
        - Azure/*
        - actions/*
        - astral-sh/*
        - aws-actions/*
        - docker/*
        - github/*
        - google-github-actions/*
        - google/*
        - googleapis/*
        - microsoft/*
        - ossf/*
        - pypa/*
        - sigstore/*
        - super-linter/super-linter
  template-injection:
    ignore:
      - osv-scanner.yml
      - osv-scanner-pr.yml
